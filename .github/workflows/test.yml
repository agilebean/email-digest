name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: SoHu-Labs/agentkit
          ref: v0.1.0
          path: vendor/agentkit
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and dev deps
        run: pip install -e vendor/agentkit && pip install -e ".[dev]"
      - name: Run pytest
        run: pytest
