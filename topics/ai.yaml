# AI topic — founder/researcher lens
# Senders: match real From addresses you receive; below use example.com (reserved for docs).

name: ai
display_name: "AI Trends — week of {date}"
senders:
  - "thebatch@deeplearning.ai"
  - "newsletter@genai.works"
  - "newsletter@aisecret.us"
  - "understandingai@substack.com"
  - "sebastianraschka@substack.com"
  - "aicollectivenewsletter@mail.beehiiv.com"
  - "hello@mail.langchain.com"
  - "demetrios@news.mlops.community"
  - "newsletters@email.reuters.com"
  - "Callum_holt@user.luma-mail.com"
keywords:
  - "ai"
  - "llm"
  - "gpt"
  - "transformer"
  - "agent"
  - "deep learning"
  - "machine learning"
folders:
  - "INBOX"
window_days: 7
extract_model: fast
synthesize_model: smart
persona_prompt: |
  You are summarizing for Chaehan, a working AI founder (Virtual Friend, Delaware
  C-corp) with 4+ years of published AI research. Skip introductory framing.
  Assume he knows transformer architecture, RLHF, agent loops, evaluation methods.
  Prioritize: (1) local LLM developments and benchmarks, (2) voice AI advances,
  (3) companies and business areas with stock-investment implications,
  (4) genuine research surprises. Quote specific numbers, model names, dates.
  Skip "hot takes" without empirical content. Do not pad.
trending:
  min_cluster_size: 2
  similarity_threshold: 0.62
  algorithm: hdbscan
output:
  template: digest_html
  also_email_to: "self"
